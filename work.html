<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作看板</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            margin: 15px;
            background: white;
            color: black;
            font-size: 18px;
            line-height: 1.6;
        }

        /* 主标题 */
        .main-title {
            font-size: 24px;
            font-weight: bold;
            margin: 0 0 25px 0;
            padding-bottom: 10px;
            border-bottom: 4px solid black;
        }

        /* 区域标题：本周待办、本月待办等 */
        .section-title {
            font-size: 20px;
            font-weight: bold;
            margin: 30px 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid black;
        }

        /* 列表样式 */
        .todo-list {
            margin: 0;
            padding-left: 25px;
            font-size: 18px;
            list-style-type: square;
        }

        .todo-list li {
            margin-bottom: 12px;
        }

        /* 两个区域之间的大分隔线 */
        .big-divider {
            border: none;
            border-top: 3px solid black;
            margin: 30px 0 10px 0;
        }

        /* 页脚提示 */
        .footer-tip {
            margin-top: 40px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-title">工作看板</div>

    <!-- 本周待办 -->
    <div class="section-title">本周待办</div>
    <ul class="todo-list">
        <li>完成项目报告</li>
        <li>团队周会</li>
    </ul>

    <!-- 本月待办 -->
    <div class="section-title">本月待办</div>
    <ul class="todo-list">
        <li>月度预算审核</li>
        <li>客户方案提交</li>
    </ul>

    <hr class="big-divider">

    <!-- 拓展目标进度 -->
    <div class="section-title">拓展目标进度</div>
    <ul class="todo-list">
        <li>学习新技术 (30%)</li>
        <li>行业分析报告 (50%)</li>
    </ul>

    <!-- 授权目标进度 -->
    <div class="section-title">授权目标进度</div>
    <ul class="todo-list">
        <li>实习生培训 - 小张负责</li>
        <li>文档整理 - 小王负责</li>
    </ul>

    <div class="footer-tip">手动更新内容 · 随改随刷</div>

</body>
</html>
