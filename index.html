<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作看板</title>
    <style>
        body { font-family: 'Microsoft YaHei', sans-serif; margin: 20px; background: white; color: black; font-size: 20px; }
        h1 { border-bottom: 2px solid black; }
        .board { display: flex; gap: 30px; margin-top: 20px; }
        .col { flex: 1; }
        h2 { margin-top: 0; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px dotted #ccc; }
        .todo li::before { content: "☐ "; font-size: 24px; margin-right: 10px; }
        .done li::before { content: "☑ "; font-size: 24px; margin-right: 10px; color: #555; }
        .done li { color: #555; text-decoration: line-through; }
        #datetime, #weekday { font-size: 24px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>📋 我的工作看板</h1>
    <div id="datetime"></div>
    <div id="weekday"></div>
    <div class="board">
        <div class="col todo">
            <h2>📌 进行中</h2>
            <ul id="todo-list"><li>加载中...</li></ul>
        </div>
        <div class="col done">
            <h2>✅ 已完成</h2>
            <ul id="done-list"><li>加载中...</li></ul>
        </div>
    </div>
    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = now.toLocaleString();
            document.getElementById('weekday').textContent = '星期' + '日一二三四五六'.charAt(now.getDay());
        }
        updateTime();
        setInterval(updateTime, 1000);

        fetch('data.txt')
            .then(response => response.text())
            .then(text => {
                const todoList = document.getElementById('todo-list');
                const doneList = document.getElementById('done-list');
                todoList.innerHTML = '';
                doneList.innerHTML = '';
                const lines = text.split('\n');
                let section = '';
                lines.forEach(line => {
                    line = line.trim();
                    if (line === '进行中') section = 'todo';
                    else if (line === '已完成') section = 'done';
                    else if (line.startsWith('- [ ]') || line.startsWith('- [x]')) {
                        const content = line.replace(/^- \[[ x]\] /, '');
                        const li = document.createElement('li');
                        li.textContent = content;
                        if (section === 'todo') todoList.appendChild(li);
                        else if (section === 'done') doneList.appendChild(li);
                    }
                });
                if (todoList.children.length === 0) todoList.innerHTML = '<li>无待办</li>';
                if (doneList.children.length === 0) doneList.innerHTML = '<li>无已完成</li>';
            })
            .catch(() => {
                document.getElementById('todo-list').innerHTML = '<li>数据加载失败</li>';
                document.getElementById('done-list').innerHTML = '<li>请确认 data.txt 存在</li>';
            });
    </script>
</body>
</html>
