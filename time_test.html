<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kindle时间显示测试</title>
    <style>
        /* 全局黑白灰，为墨水屏优化 */
        body {
            font-family: 'Courier New', 'Source Code Pro', monospace;
            margin: 20px;
            background: white;
            color: black;
            font-size: 16px;
        }
        /* 像素风格时间容器 */
        .pixel-clock {
            display: flex;
            align-items: baseline;
            font-size: 42px;
            letter-spacing: 4px;
            margin: 10px 0;
            background: #f0f0f0;
            padding: 10px 15px;
            border: 2px solid black;
            display: inline-block;
        }
        .pixel-clock span {
            display: inline-block;
            min-width: 1.2em;
            text-align: center;
        }
        .date-line, .lunar-line {
            font-size: 20px;
            margin: 5px 0;
        }
        /* 月历表格 */
        .calendar {
            margin-top: 30px;
            border-collapse: collapse;
            width: 100%;
            font-size: 18px;
        }
        .calendar th {
            border: 1px solid black;
            padding: 8px;
            background: #ddd;
            font-weight: normal;
        }
        .calendar td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        .today {
            background: black;
            color: white;
            font-weight: bold;
        }
        h2 {
            margin-top: 0;
            border-bottom: 1px solid black;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

    <h2>⏱ 时间显示测试</h2>

    <!-- 年月日、农历、像素时钟 -->
    <div class="date-line" id="dateStr"></div>
    <div class="lunar-line" id="lunarStr"></div>
    <div class="pixel-clock" id="clock"></div>

    <h2 style="margin-top: 40px;">📅 本月月历</h2>
    <div id="calendarArea"></div>

    <script>
        // ==================== 极简农历算法（1900-2100） ====================
        var lunarInfo = new Array(
            0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
            0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
            0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
            0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
            0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
            0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
            0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
            0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
            0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
            0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0
        );
        var Gan = "甲乙丙丁戊己庚辛壬癸";
        var Zhi = "子丑寅卯辰巳午未申酉戌亥";
        var Animals = "鼠牛虎兔龙蛇马羊猴鸡狗猪";
        var lunarMonths = ["正","二","三","四","五","六","七","八","九","十","冬","腊"];
        var lunarDays = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
                         "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
                         "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

        function getLunarYearInfo(year) {
            return lunarInfo[year - 1900];
        }
        function getLeapMonth(year) {
            return getLunarYearInfo(year) & 0xf;
        }
        function getMonthDays(year, month) {
            return (getLunarYearInfo(year) & (0x10000 >> month)) ? 30 : 29;
        }
        function getYearDays(year) {
            var sum = 348;
            for (var i = 0x8000; i > 0x8; i >>= 1) {
                sum += (getLunarYearInfo(year) & i) ? 1 : 0;
            }
            return sum + getLeapMonthDays(year);
        }
        function getLeapMonthDays(year) {
            if (getLeapMonth(year)) {
                return (getLunarYearInfo(year) & 0x10000) ? 30 : 29;
            }
            return 0;
        }

        function lunarToSolarOffset(year, month, day) {
            var offset = 0;
            for (var y = 1900; y < year; y++) {
                offset += getYearDays(y);
            }
            var leap = getLeapMonth(year);
            var isLeap = false;
            for (var m = 1; m < month; m++) {
                if (leap > 0 && m == leap + 1) { isLeap = true; m--; }
                offset += getMonthDays(year, m);
            }
            if (isLeap && month > leap) offset += getMonthDays(year, month);
            offset += day - 1;
            return offset;
        }

        // 公历转农历（关键函数）
        function solarToLunar(date) {
            var baseDate = new Date(1900, 0, 31);
            var offset = Math.floor((date - baseDate) / 86400000);
            var year, month, day;
            for (year = 1900; year < 2100 && offset > 0; year++) {
                var days = getYearDays(year);
                if (offset < days) break;
                offset -= days;
            }
            var leap = getLeapMonth(year);
            var isLeap = false;
            for (month = 1; month < 13 && offset > 0; month++) {
                if (leap > 0 && month == (leap + 1) && !isLeap) {
                    --month;
                    isLeap = true;
                    days = getLeapMonthDays(year);
                } else {
                    days = getMonthDays(year, month);
                }
                if (offset < days) break;
                offset -= days;
                if (isLeap && month == leap) isLeap = false;
            }
            day = offset + 1;
            return {
                year: year,
                month: month,
                day: day,
                isLeap: isLeap,
                monthStr: (isLeap ? "闰" : "") + lunarMonths[month-1],
                dayStr: lunarDays[day-1]
            };
        }

        function getLunarDate(date) {
            var lunar = solarToLunar(date);
            var yearStr = "";
            var y = lunar.year;
            var g = Gan.charAt((y - 4) % 10);
            var z = Zhi.charAt((y - 4) % 12);
            var a = Animals.charAt((y - 4) % 12);
            yearStr = g + z + "年 (" + a + ")";
            return yearStr + " " + lunar.monthStr + "月" + lunar.dayStr;
        }

        // ==================== 更新时间与日历 ====================
        function updateAll() {
            var now = new Date();
            // 年月日
            var y = now.getFullYear();
            var mo = now.getMonth() + 1;
            var d = now.getDate();
            document.getElementById('dateStr').textContent = y + '年' + mo + '月' + d + '日';

            // 农历
            document.getElementById('lunarStr').textContent = getLunarDate(now);

            // 像素时钟 24小时制
            var h = now.getHours().toString().padStart(2, '0');
            var mi = now.getMinutes().toString().padStart(2, '0');
            var s = now.getSeconds().toString().padStart(2, '0');
            var clockHtml = '';
            (h + ':' + mi + ':' + s).split('').forEach(function(ch) {
                clockHtml += '<span>' + ch + '</span>';
            });
            document.getElementById('clock').innerHTML = clockHtml;

            // 月历
            renderCalendar(y, mo);
        }

        function renderCalendar(year, month) {
            var firstDay = new Date(year, month-1, 1).getDay(); // 0=周日
            var daysInMonth = new Date(year, month, 0).getDate();
            var today = new Date().getDate();
            var isThisMonth = (year === new Date().getFullYear() && month === (new Date().getMonth()+1));
            
            var html = '<table class="calendar"><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr><tr>';
            for (var i = 0; i < firstDay; i++) {
                html += '<td></td>';
            }
            for (var day = 1; day <= daysInMonth; day++) {
                if ((day + firstDay - 1) % 7 === 0 && day !== 1) {
                    html += '</tr><tr>';
                }
                var cls = (isThisMonth && day === today) ? ' class="today"' : '';
                html += '<td' + cls + '>' + day + '</td>';
            }
            html += '</tr></table>';
            document.getElementById('calendarArea').innerHTML = html;
        }

        // 每秒刷新
        updateAll();
        setInterval(updateAll, 1000);
    </script>
</body>
</html>
