<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=800, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日历时钟</title>
    <style>
        body {
            width: 800px;
            height: 600px;
            margin: 0;
            padding: 10px;
            background: white;
            color: black;
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            font-size: 16px;
            line-height: 1.4;
            box-sizing: border-box;
            display: flex;
            flex-direction: row;
            align-items: stretch;
        }

        .left-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-right: 15px;
            border-right: 2px solid black;
        }

        .date-row {
            font-size: 24px;
            font-weight: bold;
            margin: 8px 0;
        }

        .clock {
            font-size: 80px;
            font-weight: bold;
            margin: 10px 0;
            padding: 8px 15px;
            border: 3px solid black;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 6px;
        }

        .lunar {
            font-size: 18px;
            margin: 8px 0;
        }

        .update-tip {
            font-size: 12px;
            color: #555;
            margin-top: 10px;
        }

        .right-panel {
            flex: 1;
            padding-left: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        th, td {
            border: 1px solid black;
            padding: 6px 2px;
            text-align: center;
            vertical-align: top;
        }

        th {
            background: #eee;
            font-weight: bold;
        }

        .today {
            font-weight: bold;
            border: 3px solid black;
        }

        /* 事件文字样式 */
        .event {
            display: block;
            font-size: 10px;
            line-height: 1.2;
            margin-top: 2px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="left-panel">
        <div class="date-row" id="dateRow"></div>
        <div class="clock" id="clock"></div>
        <div class="lunar" id="lunarStr"></div>
        <div class="update-tip">日拱一卒 功不唐捐</div>
    </div>

    <div class="right-panel" id="calendarArea"></div>

    <script>
        var lunarInfo = [0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0];
        var Gan="甲乙丙丁戊己庚辛壬癸";
        var Zhi="子丑寅卯辰巳午未申酉戌亥";
        var Animals="鼠牛虎兔龙蛇马羊猴鸡狗猪";
        var lunarMonths=["正","二","三","四","五","六","七","八","九","十","冬","腊"];
        var lunarDays=["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

        function getLunarYearInfo(y){return lunarInfo[y-1900];}
        function getLeapMonth(y){return getLunarYearInfo(y)&0xf;}
        function getMonthDays(y,m){return(getLunarYearInfo(y)&(0x10000>>m))?30:29;}
        function getYearDays(y){var s=348;for(var i=0x8000;i>0x8;i>>=1)s+=(getLunarYearInfo(y)&i)?1:0;return s+getLeapMonthDays(y);}
        function getLeapMonthDays(y){if(getLeapMonth(y))return(getLunarYearInfo(y)&0x10000)?30:29;return 0;}

        function solarToLunar(d){
            var base=new Date(1900,0,31);
            var offset=Math.floor((d-base)/86400000);
            var y,m,day;
            for(y=1900;y<2100&&offset>0;y++){
                var days=getYearDays(y);
                if(offset<days)break;
                offset-=days;
            }
            var leap=getLeapMonth(y);
            var isLeap=false;
            for(m=1;m<13&&offset>0;m++){
                var days;
                if(leap>0&&m==(leap+1)&&!isLeap){
                    --m;isLeap=true;days=getLeapMonthDays(y);
                } else {
                    days=getMonthDays(y,m);
                }
                if(offset<days)break;
                offset-=days;
                if(isLeap&&m==leap)isLeap=false;
            }
            day=offset+1;
            return{
                year:y, month:m, day:day, isLeap:isLeap,
                monthStr:(isLeap?"闰":"")+lunarMonths[m-1],
                dayStr:lunarDays[day-1]
            };
        }

        function getLunarDate(d){
            var l=solarToLunar(d);
            var y=l.year;
            return Gan.charAt((y-4)%10)+Zhi.charAt((y-4)%12)+"年 ("+Animals.charAt((y-4)%12)+") "+l.monthStr+"月"+l.dayStr;
        }

        function getBeijingTime(){
            var now = new Date();
            var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 8));
        }

        // 定义本月事件（可随时修改这里）
        function getEvents(year, month) {
            // 6月事件
            if (year === 2026 && month === 6) {
                return {
                    9: "周会",
                    10: "分总会",
                    16: "周会",
                    23: "周会"
                };
            }
            // 其他月份可继续添加
            return {};
        }

        function updateAll(){
            var now = getBeijingTime();
            var weekDays=['日','一','二','三','四','五','六'];

            document.getElementById('dateRow').innerHTML = 
                now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + weekDays[now.getDay()];

            var h = now.getHours();
            var m = now.getMinutes();
            var timeString = (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
            document.getElementById('clock').innerHTML = timeString;

            document.getElementById('lunarStr').innerHTML = getLunarDate(now);

            renderCalendar(now.getFullYear(), now.getMonth()+1);

            clearTimeout(window.updateTimer);
            window.updateTimer = setTimeout(updateAll, 60000);
        }

        function renderCalendar(year, month){
            var firstDay = new Date(year, month-1, 1).getDay();
            var daysInMonth = new Date(year, month, 0).getDate();
            var todayDate = getBeijingTime();
            var today = todayDate.getDate();
            var isThisMonth = (year === todayDate.getFullYear() && month === (todayDate.getMonth()+1));

            var events = getEvents(year, month);

            var html = '<table><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr><tr>';
            for(var i = 0; i < firstDay; i++) {
                html += '<td></td>';
            }
            for(var day = 1; day <= daysInMonth; day++) {
                if((day + firstDay - 1) % 7 === 0 && day !== 1) {
                    html += '</tr><tr>';
                }

                var cls = (isThisMonth && day === today) ? ' class="today"' : '';
                var eventText = events[day] || '';

                html += '<td' + cls + '>' + day;
                if (eventText) {
                    html += '<span class="event">' + eventText + '</span>';
                }
                html += '</td>';
            }
            html += '</tr></table>';
            document.getElementById('calendarArea').innerHTML = html;
        }

        updateAll();
    </script>
</body>
</html>
